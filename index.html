<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Domain Experts — Folder Contribution Explorer</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --panel: #ffffff;
            --border: #e2e5ea;
            --text: #1f2330;
            --muted: #6b7280;
            --accent: #3b82f6;
            --bar: #3b82f6;
            --bar-bg: #eef2f7;
            --selected: #e8f0fe;
            --hover: #f0f2f5;
        }

        * {
            box-sizing: border-box;
        }

        [hidden] {
            display: none !important;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 12px 18px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        header h1 {
            font-size: 16px;
            margin: 0;
            font-weight: 650;
        }

        header .meta {
            font-size: 12px;
            color: var(--muted);
        }

        .spacer {
            flex: 1;
        }

        .file-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            background: #fff;
        }

        .file-label:hover {
            background: var(--hover);
        }

        input[type="file"] {
            display: none;
        }

        main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        #tree-panel {
            width: 340px;
            min-width: 240px;
            max-width: 50%;
            border-right: 1px solid var(--border);
            background: var(--panel);
            overflow: auto;
            padding: 8px 6px;
            resize: horizontal;
        }

        #detail-panel {
            flex: 1;
            overflow: auto;
            padding: 18px 22px;
        }

        ul.tree {
            list-style: none;
            margin: 0;
            padding-left: 0;
        }

        ul.tree ul {
            list-style: none;
            margin: 0;
            padding-left: 14px;
        }

        .tree-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 6px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .tree-row:hover {
            background: var(--hover);
        }

        .tree-row.selected {
            background: var(--selected);
            font-weight: 600;
        }

        .toggle {
            width: 14px;
            display: inline-block;
            text-align: center;
            color: var(--muted);
            font-size: 10px;
            user-select: none;
        }

        .folder-icon {
            font-size: 12px;
            opacity: .8;
        }

        .tree-row .count {
            color: var(--muted);
            font-size: 11px;
            font-weight: 400;
        }

        .empty {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            text-align: center;
            gap: 10px;
        }

        .empty code {
            background: #eef0f3;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .breadcrumb {
            font-size: 13px;
            margin-bottom: 4px;
            color: var(--muted);
        }

        .breadcrumb a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        h2.path-title {
            margin: 2px 0 12px;
            font-size: 20px;
            word-break: break-all;
        }

        .controls {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            align-items: center;
            padding: 10px 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group .lbl {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--muted);
        }

        .segmented {
            display: inline-flex;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .segmented button {
            border: none;
            background: #fff;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            color: var(--text);
        }

        .segmented button+button {
            border-left: 1px solid var(--border);
        }

        .segmented button.active {
            background: var(--accent);
            color: #fff;
        }

        .segmented button:disabled {
            color: #b6bcc7;
            cursor: not-allowed;
            background: #fafbfc;
        }

        .summary {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .summary b {
            color: var(--text);
        }

        table.contrib {
            width: 100%;
            border-collapse: collapse;
        }

        table.contrib th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: var(--muted);
            font-weight: 600;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
        }

        table.contrib th.num,
        table.contrib td.num {
            text-align: right;
        }

        table.contrib td {
            padding: 8px;
            border-bottom: 1px solid #f0f1f4;
            vertical-align: middle;
        }

        .who .name {
            font-weight: 600;
            font-size: 14px;
        }

        .who .email {
            font-size: 12px;
            color: var(--muted);
        }

        .bar-cell {
            width: 38%;
            min-width: 180px;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-track {
            flex: 1;
            height: 10px;
            background: var(--bar-bg);
            border-radius: 6px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--bar);
            border-radius: 6px;
        }

        .pct {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            min-width: 52px;
            text-align: right;
        }

        .num {
            font-variant-numeric: tabular-nums;
        }

        .stale {
            color: #b45309;
        }

        .rank {
            color: var(--muted);
            width: 26px;
            text-align: right;
        }

        .note {
            font-size: 12px;
            color: var(--muted);
            margin-top: 8px;
        }

        table.contrib th.sortable {
            cursor: pointer;
            user-select: none;
        }

        table.contrib th.sortable:hover {
            color: var(--text);
        }

        table.contrib th.sort-asc::after {
            content: ' ▲';
            font-size: 9px;
        }

        table.contrib th.sort-desc::after {
            content: ' ▼';
            font-size: 9px;
        }

        .tab-bar {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 14px;
        }

        .tab-bar button {
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
        }

        .tab-bar button:hover {
            color: var(--text);
        }

        .tab-bar button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            margin: 0 0 8px;
            color: var(--text);
        }

        .domain-sections {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <header>
        <h1>Domain Experts</h1>
        <div class="meta" id="repo-meta"></div>
        <div class="spacer"></div>
        <label class="file-label">
            📂 Load contributions.json
            <input type="file" id="file-input" accept="application/json,.json" />
        </label>
    </header>

    <main>
        <aside id="tree-panel">
            <div class="empty" id="tree-empty">No data loaded</div>
            <ul class="tree" id="tree-root" hidden></ul>
        </aside>
        <section id="detail-panel">
            <div class="empty" id="detail-empty">
                <div style="font-size:42px">🗂️</div>
                <div><b>Folder contribution explorer</b></div>
                <div>Generate data with <code>node generate.js /path/to/repo contributions.json</code></div>
                <div>then load the JSON using the button in the top-right.</div>
            </div>
            <div id="detail-content" hidden></div>
        </section>
    </main>

    <script>
        "use strict";

        // ---- tunables -------------------------------------------------------------
        const W_COMMITS = 0.7;   // weight of commit share in the "Commits + Lines" metric
        const W_LINES = 0.3;   // weight of line share   in the "Commits + Lines" metric

        // ---- state ----------------------------------------------------------------
        let data = null;                 // parsed JSON
        let nodesByPath = new Map();     // path -> node
        let childrenByPath = new Map();  // parentPath -> [childPath,...]
        let treeIndex = new Map();       // path -> { row, expand }
        let currentPath = null;
        let currentMetric = 'commits';   // 'commits' | 'combined' | 'recency'
        let currentScope = 'all';        // 'all' | 'recent'
        let currentSortCol = 'share';    // 'contributor' | 'share' | 'commits' | 'lines' | 'lastactive'
        let currentSortDir = 'desc';     // 'asc' | 'desc'
        let selectedRow = null;
        let currentTab = 'contributors'; // 'contributors' | 'domains'

        // ---- loading --------------------------------------------------------------
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    loadData(JSON.parse(reader.result));
                } catch (err) {
                    alert('Could not parse JSON: ' + err.message);
                }
            };
            reader.readAsText(file);
        });

        function loadData(json) {
            data = json;
            nodesByPath = new Map();
            childrenByPath = new Map();
            treeIndex = new Map();
            selectedRow = null;
            currentSortCol = 'share';
            currentSortDir = 'desc';
            currentTab = 'contributors';

            for (const node of data.nodes) nodesByPath.set(node.path, node);

            // Derive parent → children from the set of folder paths.
            for (const node of data.nodes) {
                const p = node.path;
                if (p === '') continue;
                const parent = parentOf(p);
                if (!childrenByPath.has(parent)) childrenByPath.set(parent, []);
                childrenByPath.get(parent).push(p);
            }
            for (const list of childrenByPath.values()) {
                list.sort((a, b) => leaf(a).localeCompare(leaf(b)));
            }

            // header meta
            const gen = new Date(data.generatedAt * 1000);
            document.getElementById('repo-meta').textContent =
                `${data.repoName || 'repo'} · ${data.totalCommits.toLocaleString()} commits · ` +
                `generated ${gen.toLocaleDateString()}`;

            // build tree
            const treeRoot = document.getElementById('tree-root');
            treeRoot.innerHTML = '';
            treeRoot.hidden = false;
            document.getElementById('tree-empty').hidden = true;
            treeRoot.appendChild(renderTreeNode(''));

            // reset controls
            currentMetric = 'commits';
            currentScope = 'all';

            // select & reveal root
            go('');
            const rootEntry = treeIndex.get('');
            if (rootEntry) rootEntry.expand();
        }

        // ---- path helpers ---------------------------------------------------------
        function parentOf(p) {
            const i = p.lastIndexOf('/');
            return i === -1 ? '' : p.slice(0, i);
        }
        function leaf(p) {
            const i = p.lastIndexOf('/');
            return i === -1 ? p : p.slice(i + 1);
        }
        function displayName(p) {
            if (p === '') return (data && data.repoName) ? data.repoName + '/' : '/';
            return leaf(p);
        }

        // ---- tree rendering (lazy) ------------------------------------------------
        function renderTreeNode(p) {
            const li = document.createElement('li');
            const row = document.createElement('div');
            row.className = 'tree-row';

            const kids = childrenByPath.get(p) || [];
            const hasKids = kids.length > 0;

            const toggle = document.createElement('span');
            toggle.className = 'toggle';
            toggle.textContent = hasKids ? '▶' : '';

            const icon = document.createElement('span');
            icon.className = 'folder-icon';
            icon.textContent = '📁';

            const label = document.createElement('span');
            label.textContent = displayName(p);

            const count = document.createElement('span');
            const node = nodesByPath.get(p);
            if (node) count.textContent = ' (' + node.contributors.length + ')';
            count.className = 'count';

            row.appendChild(toggle);
            row.appendChild(icon);
            row.appendChild(label);
            row.appendChild(count);
            li.appendChild(row);

            const childUl = document.createElement('ul');
            childUl.hidden = true;
            li.appendChild(childUl);

            let built = false;
            function expand() {
                if (hasKids) {
                    if (!built) {
                        for (const k of kids) childUl.appendChild(renderTreeNode(k));
                        built = true;
                    }
                    childUl.hidden = false;
                    toggle.textContent = '▼';
                }
            }
            function collapse() {
                childUl.hidden = true;
                if (hasKids) toggle.textContent = '▶';
            }

            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                if (childUl.hidden) expand(); else collapse();
            });
            row.addEventListener('click', () => { go(p); expand(); });

            treeIndex.set(p, { row, expand });
            return li;
        }

        function revealPath(target) {
            const rootEntry = treeIndex.get('');
            if (rootEntry) rootEntry.expand();
            if (target !== '') {
                const segs = target.split('/');
                let acc = '';
                for (const s of segs) {
                    acc = acc === '' ? s : acc + '/' + s;
                    const e = treeIndex.get(acc);
                    if (!e) break;
                    e.expand();
                }
            }
            const tgt = treeIndex.get(target);
            if (tgt) highlightRow(tgt.row);
        }

        function highlightRow(row) {
            if (selectedRow) selectedRow.classList.remove('selected');
            selectedRow = row;
            row.classList.add('selected');
            row.scrollIntoView({ block: 'nearest' });
        }

        // ---- navigation -----------------------------------------------------------
        function go(p) {
            if (!nodesByPath.has(p)) return;
            currentPath = p;
            revealPath(p);
            renderDetails(p);
        }

        // ---- metric computation ---------------------------------------------------
        function computeRows(node) {
            const scope = (currentMetric === 'recency') ? 'all' : currentScope;
            const rows = node.contributors.map((c) => ({
                c,
                commitsVal: scope === 'recent' ? c.commitsRecent : c.commits,
                linesVal: scope === 'recent' ? c.linesRecent : c.lines,
                raw: 0,
                pct: 0,
            }));

            let sumC = 0, sumL = 0;
            for (const r of rows) { sumC += r.commitsVal; sumL += r.linesVal; }

            for (const r of rows) {
                if (currentMetric === 'commits') r.raw = r.commitsVal;
                else if (currentMetric === 'recency') r.raw = r.c.score;
                else {
                    const sc = sumC > 0 ? r.commitsVal / sumC : 0;
                    const sl = sumL > 0 ? r.linesVal / sumL : 0;
                    r.raw = W_COMMITS * sc + W_LINES * sl;
                }
            }

            let sumRaw = 0;
            for (const r of rows) sumRaw += r.raw;
            for (const r of rows) r.pct = sumRaw > 0 ? (r.raw / sumRaw * 100) : 0;

            rows.sort((a, b) => (b.raw - a.raw) || (b.commitsVal - a.commitsVal));
            return { rows, sumC, sumL, scope };
        }

        // ---- detail rendering -----------------------------------------------------
        function renderDetails(p) {
            document.getElementById('detail-empty').hidden = true;
            const host = document.getElementById('detail-content');
            host.hidden = false;

            const node = nodesByPath.get(p);
            const recentLabel = `Recent (${data.recentDays}d)`;

            host.innerHTML = '';
            host.appendChild(buildBreadcrumb(p));

            const title = document.createElement('h2');
            title.className = 'path-title';
            title.textContent = p === '' ? displayName('') : p;
            host.appendChild(title);

            host.appendChild(buildTabBar());

            if (currentTab === 'contributors') {
                const { rows, sumC, sumL, scope } = computeRows(node);

                host.appendChild(buildControls(recentLabel));

                const summary = document.createElement('div');
                summary.className = 'summary';
                const activeRows = rows.filter((r) => r.commitsVal > 0 || currentMetric === 'recency');
                summary.innerHTML =
                    `<b>${activeRows.length}</b> contributor${activeRows.length === 1 ? '' : 's'} · ` +
                    `<b>${sumC.toLocaleString()}</b> commits · ` +
                    `<b>${sumL.toLocaleString()}</b> lines changed` +
                    (scope === 'recent' ? ` · ${recentLabel}` : '');
                host.appendChild(summary);

                host.appendChild(buildTable(rows));

                const note = document.createElement('div');
                note.className = 'note';
                if (currentMetric === 'combined') {
                    note.textContent = `"Commits + Lines" = ${W_COMMITS} × commit share + ${W_LINES} × line share.`;
                } else if (currentMetric === 'recency') {
                    note.textContent = `Recency-weighted: each commit decays with a ${data.halfLifeDays}-day half-life (scope toggle disabled).`;
                } else {
                    note.textContent = 'Commits: a commit is counted once per folder it touched (rolled up over the subtree).';
                }
                host.appendChild(note);
            } else {
                renderDomainMapTab(p, host, recentLabel);
            }
        }

        function buildBreadcrumb(p) {
            const bc = document.createElement('div');
            bc.className = 'breadcrumb';
            const mk = (label, target) => {
                const a = document.createElement('a');
                a.textContent = label;
                a.addEventListener('click', () => go(target));
                return a;
            };
            bc.appendChild(mk(displayName(''), ''));
            if (p !== '') {
                const segs = p.split('/');
                let acc = '';
                for (const s of segs) {
                    acc = acc === '' ? s : acc + '/' + s;
                    bc.appendChild(document.createTextNode(' / '));
                    bc.appendChild(mk(s, acc));
                }
            }
            return bc;
        }

        function buildControls(recentLabel) {
            const wrap = document.createElement('div');
            wrap.className = 'controls';

            const metricGroup = segmented('Metric', [
                { id: 'commits', label: 'Commits' },
                { id: 'combined', label: 'Commits + Lines' },
                { id: 'recency', label: 'Recency-weighted' },
            ], currentMetric, (id) => { currentMetric = id; renderDetails(currentPath); });

            const scopeButtons = [
                { id: 'all', label: 'All time' },
                { id: 'recent', label: recentLabel },
            ];
            const scopeGroup = segmented('Time scope', scopeButtons, currentScope,
                (id) => { currentScope = id; renderDetails(currentPath); },
                currentMetric === 'recency');

            wrap.appendChild(metricGroup);
            wrap.appendChild(scopeGroup);
            return wrap;
        }

        function segmented(labelText, buttons, active, onPick, disabled) {
            const group = document.createElement('div');
            group.className = 'control-group';
            const lbl = document.createElement('span');
            lbl.className = 'lbl';
            lbl.textContent = labelText;
            group.appendChild(lbl);

            const seg = document.createElement('div');
            seg.className = 'segmented';
            for (const b of buttons) {
                const btn = document.createElement('button');
                btn.textContent = b.label;
                if (b.id === active) btn.classList.add('active');
                if (disabled) btn.disabled = true;
                btn.addEventListener('click', () => onPick(b.id));
                seg.appendChild(btn);
            }
            group.appendChild(seg);
            return group;
        }

        function buildTable(rows) {
            const dir = currentSortDir === 'asc' ? 1 : -1;
            rows.sort((a, b) => {
                switch (currentSortCol) {
                    case 'contributor': return dir * ((a.c.name || a.c.email || '').localeCompare(b.c.name || b.c.email || ''));
                    case 'commits': return dir * (a.commitsVal - b.commitsVal);
                    case 'lines': return dir * (a.linesVal - b.linesVal);
                    case 'lastactive': {
                        if (!a.c.lastTs && b.c.lastTs) return 1;
                        if (a.c.lastTs && !b.c.lastTs) return -1;
                        return dir * ((a.c.lastTs || 0) - (b.c.lastTs || 0));
                    }
                    default: return dir * (a.raw - b.raw); // 'share'
                }
            });

            const table = document.createElement('table');
            table.className = 'contrib';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const cols = [
                { id: null, label: '#', cls: 'num' },
                { id: 'contributor', label: 'Contributor', cls: '' },
                { id: 'share', label: 'Share', cls: 'bar-cell' },
                { id: 'commits', label: 'Commits', cls: 'num' },
                { id: 'lines', label: 'Lines', cls: 'num' },
                { id: 'lastactive', label: 'Last active', cls: '' },
            ];
            for (const col of cols) {
                const th = document.createElement('th');
                if (col.cls) th.className = col.cls;
                th.textContent = col.label;
                if (col.id) {
                    th.classList.add('sortable');
                    if (col.id === currentSortCol) {
                        th.classList.add(currentSortDir === 'asc' ? 'sort-asc' : 'sort-desc');
                    }
                    th.addEventListener('click', () => {
                        if (currentSortCol === col.id) {
                            currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
                        } else {
                            currentSortCol = col.id;
                            currentSortDir = col.id === 'contributor' ? 'asc' : 'desc';
                        }
                        renderDetails(currentPath);
                    });
                }
                headerRow.appendChild(th);
            }
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');

            let rank = 0;
            for (const r of rows) {
                if (r.commitsVal === 0 && currentMetric !== 'recency') continue;
                if (currentMetric === 'recency' && r.c.score === 0) continue;
                rank++;
                const tr = document.createElement('tr');

                const tdRank = document.createElement('td');
                tdRank.className = 'rank num';
                tdRank.textContent = rank;

                const tdWho = document.createElement('td');
                tdWho.className = 'who';
                tdWho.innerHTML =
                    `<div class="name"></div><div class="email"></div>`;
                tdWho.querySelector('.name').textContent = r.c.name || r.c.email || '(unknown)';
                tdWho.querySelector('.email').textContent = r.c.email || '';

                const tdBar = document.createElement('td');
                tdBar.className = 'bar-cell';
                const fillW = Math.max(0, Math.min(100, r.pct)).toFixed(1);
                tdBar.innerHTML =
                    `<div class="bar-wrap"><div class="bar-track">` +
                    `<div class="bar-fill" style="width:${fillW}%"></div></div>` +
                    `<span class="pct">${r.pct.toFixed(1)}%</span></div>`;

                const tdCommits = document.createElement('td');
                tdCommits.className = 'num';
                tdCommits.textContent = r.commitsVal.toLocaleString();

                const tdLines = document.createElement('td');
                tdLines.className = 'num';
                tdLines.textContent = r.linesVal.toLocaleString();

                const tdLast = document.createElement('td');
                tdLast.appendChild(lastActive(r.c.lastTs));

                tr.appendChild(tdRank);
                tr.appendChild(tdWho);
                tr.appendChild(tdBar);
                tr.appendChild(tdCommits);
                tr.appendChild(tdLines);
                tr.appendChild(tdLast);
                tbody.appendChild(tr);
            }

            table.appendChild(tbody);
            return table;
        }

        function lastActive(ts) {
            const span = document.createElement('span');
            if (!ts) { span.textContent = '—'; return span; }
            const days = Math.floor((data.nowTs - ts) / 86400);
            let rel;
            if (days <= 0) rel = 'today';
            else if (days < 30) rel = days + 'd ago';
            else if (days < 365) rel = Math.floor(days / 30) + 'mo ago';
            else rel = (Math.floor(days / 365 * 10) / 10) + 'y ago';
            const d = new Date(ts * 1000);
            span.textContent = rel;
            span.title = d.toLocaleDateString();
            if (days > 365) span.className = 'stale';
            return span;
        }

        // ---- tab 2: domain map ----------------------------------------------------
        function buildTabBar() {
            const bar = document.createElement('div');
            bar.className = 'tab-bar';
            for (const t of [
                { id: 'contributors', label: 'Contributors' },
                { id: 'domains', label: 'Domain Map' },
            ]) {
                const btn = document.createElement('button');
                btn.textContent = t.label;
                if (t.id === currentTab) btn.classList.add('active');
                btn.addEventListener('click', () => {
                    if (currentTab !== t.id) { currentTab = t.id; renderDetails(currentPath); }
                });
                bar.appendChild(btn);
            }
            return bar;
        }

        function topExpert(node) {
            if (!node) return null;
            const { rows } = computeRows(node);
            const active = rows.filter(r => currentMetric === 'recency' ? r.c.score > 0 : r.commitsVal > 0);
            return active.length > 0 ? { contributor: active[0].c, pct: active[0].pct } : null;
        }

        function renderDomainMapTab(p, host, recentLabel) {
            host.appendChild(buildControls(recentLabel));

            const kids = (childrenByPath.get(p) || []).filter(k => nodesByPath.has(k));

            if (kids.length === 0) {
                const msg = document.createElement('div');
                msg.className = 'empty';
                msg.style.height = '160px';
                msg.textContent = 'No subfolders at this level.';
                host.appendChild(msg);
                return;
            }

            const sfExperts = kids.map(k => {
                const ex = topExpert(nodesByPath.get(k));
                return { path: k, contributor: ex ? ex.contributor : null, pct: ex ? ex.pct : 0 };
            });

            const total = kids.length;
            const expertMap = new Map();
            for (const sf of sfExperts) {
                if (!sf.contributor) continue;
                const key = sf.contributor.email || sf.contributor.name || '?';
                if (!expertMap.has(key)) expertMap.set(key, { c: sf.contributor, paths: [] });
                expertMap.get(key).paths.push(sf.path);
            }
            const expertList = [...expertMap.values()].sort((a, b) => b.paths.length - a.paths.length);

            const sections = document.createElement('div');
            sections.className = 'domain-sections';

            const h1 = document.createElement('p');
            h1.className = 'section-title';
            h1.textContent = 'Expert coverage';
            sections.appendChild(h1);
            sections.appendChild(buildCoverageTable(expertList, total));

            const h2el = document.createElement('p');
            h2el.className = 'section-title';
            h2el.style.marginTop = '20px';
            h2el.textContent = 'Subfolder breakdown';
            sections.appendChild(h2el);
            sections.appendChild(buildSubfolderTable(sfExperts));

            host.appendChild(sections);
        }

        function buildCoverageTable(expertList, total) {
            const table = document.createElement('table');
            table.className = 'contrib';

            const thead = document.createElement('thead');
            const hdrRow = document.createElement('tr');
            for (const [lbl, cls] of [
                ['#', 'num'], ['Expert', ''], ['Coverage', 'bar-cell'], ['Subfolders', ''],
            ]) {
                const th = document.createElement('th');
                th.textContent = lbl;
                if (cls) th.className = cls;
                hdrRow.appendChild(th);
            }
            thead.appendChild(hdrRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            expertList.forEach((e, i) => {
                const pct = (e.paths.length / total) * 100;
                const tr = document.createElement('tr');

                const tdR = document.createElement('td');
                tdR.className = 'rank num';
                tdR.textContent = i + 1;

                const tdW = document.createElement('td');
                tdW.className = 'who';
                tdW.innerHTML = '<div class="name"></div><div class="email"></div>';
                tdW.querySelector('.name').textContent = e.c.name || e.c.email || '(unknown)';
                tdW.querySelector('.email').textContent = e.c.email || '';

                const tdB = document.createElement('td');
                tdB.className = 'bar-cell';
                tdB.innerHTML =
                    `<div class="bar-wrap"><div class="bar-track">` +
                    `<div class="bar-fill" style="width:${pct.toFixed(1)}%"></div></div>` +
                    `<span class="pct">${e.paths.length}/${total} (${Math.round(pct)}%)</span></div>`;

                const tdF = document.createElement('td');
                tdF.style.cssText = 'font-size:12px;color:var(--muted);';
                tdF.textContent = e.paths.map(pk => leaf(pk)).join(', ');

                tr.append(tdR, tdW, tdB, tdF);
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            return table;
        }

        function buildSubfolderTable(sfExperts) {
            const table = document.createElement('table');
            table.className = 'contrib';

            const thead = document.createElement('thead');
            const hdrRow = document.createElement('tr');
            for (const [lbl, cls] of [
                ['Subfolder', ''], ['Expert', ''], ['Share in folder', 'num'],
            ]) {
                const th = document.createElement('th');
                th.textContent = lbl;
                if (cls) th.className = cls;
                hdrRow.appendChild(th);
            }
            thead.appendChild(hdrRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            for (const sf of sfExperts) {
                const tr = document.createElement('tr');

                const tdP = document.createElement('td');
                const a = document.createElement('a');
                a.style.cssText = 'color:var(--accent);cursor:pointer;font-size:13px;font-weight:500;';
                a.textContent = leaf(sf.path) + '/';
                a.addEventListener('click', () => go(sf.path));
                a.addEventListener('mouseenter', () => { a.style.textDecoration = 'underline'; });
                a.addEventListener('mouseleave', () => { a.style.textDecoration = ''; });
                tdP.appendChild(a);

                const tdW = document.createElement('td');
                if (sf.contributor) {
                    tdW.className = 'who';
                    tdW.innerHTML = '<div class="name"></div><div class="email"></div>';
                    tdW.querySelector('.name').textContent = sf.contributor.name || sf.contributor.email || '(unknown)';
                    tdW.querySelector('.email').textContent = sf.contributor.email || '';
                } else {
                    tdW.style.color = 'var(--muted)';
                    tdW.textContent = '—';
                }

                const tdS = document.createElement('td');
                tdS.className = 'num';
                tdS.textContent = sf.contributor ? sf.pct.toFixed(1) + '%' : '—';

                tr.append(tdP, tdW, tdS);
                tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            return table;
        }
    </script>
</body>
